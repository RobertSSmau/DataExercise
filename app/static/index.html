<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Mercato del lavoro</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<h2>Mercato del lavoro in Italia</h2>

<div>
  <label for="serie">Serie calcolata:</label>
  <select id="serie">
    <option value="/api/serie/partecipazione/aree">1. Partecipazione lavoro - 5 Aree</option>
    <option value="/api/serie/partecipazione/nazionale">2. Partecipazione lavoro - Nazionale</option>
    <option value="/api/serie/ricerca/aree">3. Incidenza spesa R&S - 5 Aree</option>
    <option value="/api/serie/sopravvivenza/nazionale">4. Sopravvivenza imprese - Nazionale</option>
    <option value="/api/serie/sopravvivenza/aree">5. Sopravvivenza imprese - 5 Aree</option>
  </select>
</div>
<div style="margin-top: 8px;">
  <label for="da">Da anno:</label>
  <input id="da" type="number" value="2004">
  <label for="a" style="margin-left:10px;">A anno:</label>
  <input id="a" type="number" value="2022">
  <button onclick="carica()" style="margin-left:10px;">Carica</button>
</div>

<p id="msg"></p>

<table id="tabella" style="display:none;">
  <thead>
    <tr>
      <th>Anno</th>
      <th>Area</th>
      <th>Valore</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<p style="margin-top:20px;">
  <a href="/docs">Swagger UI</a> |
  <a href="/api/partecipazione?da_anno=2010&a_anno=2020">/api/partecipazione</a> |
  <a href="/api/sopravvivenza?da_anno=2010&a_anno=2020">/api/sopravvivenza</a> |
  <a href="/api/ricerca?da_anno=2010&a_anno=2020">/api/ricerca</a>
</p>

<script src="/static/script.js"></script>
</body>
</html>
